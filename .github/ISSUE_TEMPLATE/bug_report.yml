name: Bug report
description: Report a reproducible defect in AIAGET.
title: 'bug: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible path.
      placeholder: |
        1. Start ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or version
      placeholder: 'commit SHA, branch, or release'
  - type: dropdown
    id: affected_area
    attributes:
      label: Affected area
      options:
        - Web Console
        - Control API
        - Agent Runtime
        - SDK / packages
        - Deployment / production template
        - Documentation
        - Security-sensitive workflow
        - Other
    validations:
      required: true
  - type: dropdown
    id: impact
    attributes:
      label: Impact
      options:
        - Blocks deployment or release
        - Breaks a core user workflow
        - Security or tenant isolation concern
        - Regression with workaround
        - Minor defect
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node, pnpm, Python, browser, and deployment mode when relevant.
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove credentials, customer data, tokens, and private URLs before posting.
      render: shell
