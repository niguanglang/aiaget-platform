name: Bug report
description: Report a reproducible defect in AIAGET.
title: 'bug: '
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened, and what did you expect?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Provide the smallest reproducible path.
      placeholder: |
        1. Start ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit or version
      placeholder: 'commit SHA, branch, or release'
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Include OS, Node, pnpm, Python, browser, and deployment mode when relevant.
  - type: textarea
    id: logs
    attributes:
      label: Sanitized logs
      description: Remove credentials, customer data, tokens, and private URLs before posting.
      render: shell
