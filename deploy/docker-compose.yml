name: aiaget

services:
  postgres:
    image: postgres:16-alpine
    container_name: aiaget-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aiaget}
      POSTGRES_USER: ${POSTGRES_USER:-aiaget}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aiaget_dev_password}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aiaget} -d ${POSTGRES_DB:-aiaget}"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - aiaget

  redis:
    image: redis:7-alpine
    container_name: aiaget-redis
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - aiaget

  minio:
    image: minio/minio:latest
    container_name: aiaget-minio
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_dev_password}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - aiaget

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aiaget-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aiaget

  opensearch:
    image: opensearchproject/opensearch:latest
    container_name: aiaget-opensearch
    environment:
      discovery.type: single-node
      plugins.security.disabled: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:-OpenSearchDevPassword123!}
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - aiaget

  temporal:
    image: temporalio/auto-setup:latest
    container_name: aiaget-temporal
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB: postgres12
      DB_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-aiaget}
      POSTGRES_PWD: ${POSTGRES_PASSWORD:-aiaget_dev_password}
      POSTGRES_SEEDS: postgres
    ports:
      - "7233:7233"
    networks:
      - aiaget

  temporal-ui:
    image: temporalio/ui:latest
    container_name: aiaget-temporal-ui
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - aiaget

volumes:
  postgres_data:
  redis_data:
  minio_data:
  qdrant_data:
  opensearch_data:

networks:
  aiaget:
    driver: bridge

