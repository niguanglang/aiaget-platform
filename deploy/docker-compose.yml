name: aiaget

services:
  minio:
    image: minio/minio:latest
    container_name: aiaget-minio
    profiles: ["local"]
    command: ["server", "/data", "--console-address", ":9001"]
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER-}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD-}
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    networks:
      - aiaget

  qdrant:
    image: qdrant/qdrant:latest
    container_name: aiaget-qdrant
    profiles: ["local"]
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY-}
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_data:/qdrant/storage
    networks:
      - aiaget

  opensearch:
    image: opensearchproject/opensearch:2.19.3
    container_name: aiaget-opensearch
    profiles: ["local"]
    environment:
      discovery.type: single-node
      DISABLE_SECURITY_PLUGIN: "true"
      bootstrap.memory_lock: "true"
      OPENSEARCH_JAVA_OPTS: "-Xms512m -Xmx512m"
    ulimits:
      memlock:
        soft: -1
        hard: -1
      nofile:
        soft: 65536
        hard: 65536
    ports:
      - "9200:9200"
      - "9600:9600"
    volumes:
      - opensearch_data:/usr/share/opensearch/data
    networks:
      - aiaget

  temporal:
    image: temporalio/auto-setup:latest
    container_name: aiaget-temporal
    profiles: ["local"]
    environment:
      DB: postgres12
      DB_PORT: ${TEMPORAL_POSTGRES_PORT:-5432}
      POSTGRES_USER: ${TEMPORAL_POSTGRES_USER-}
      POSTGRES_PWD: ${TEMPORAL_POSTGRES_PASSWORD-}
      POSTGRES_SEEDS: ${TEMPORAL_POSTGRES_HOST-}
    ports:
      - "7233:7233"
    networks:
      - aiaget

  temporal-ui:
    image: temporalio/ui:latest
    container_name: aiaget-temporal-ui
    profiles: ["local"]
    depends_on:
      - temporal
    environment:
      TEMPORAL_ADDRESS: temporal:7233
      TEMPORAL_CORS_ORIGINS: http://localhost:3000
    ports:
      - "8080:8080"
    networks:
      - aiaget

volumes:
  minio_data:
  qdrant_data:
    name: aiaget_qdrant_data
  opensearch_data:
    name: aiaget_opensearch_data

networks:
  aiaget:
    driver: bridge
